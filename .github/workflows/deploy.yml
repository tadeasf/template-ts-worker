name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the initial template-copy push. GitHub's repo-from-template creates
    # an "Initial commit" before Terraform finishes provisioning Actions secrets,
    # so the first deploy would always fail on empty secrets. Users trigger the
    # first real deploy themselves via a subsequent commit.
    if: github.event.head_commit.message != 'Initial commit'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify required secrets are present
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_NAME: ${{ secrets.D1_DATABASE_NAME }}
        run: |
          fail=0
          for var in CF_TOKEN CF_ACCOUNT D1_ID D1_NAME; do
            val="${!var}"
            if [[ -z "$val" ]]; then
              echo "::error::$var is empty"
              fail=1
            else
              echo "$var length: ${#val}"
            fi
          done
          [[ $fail -eq 0 ]] || exit 1

      - name: Materialize wrangler config
        env:
          PROJECT_NAME: ${{ github.event.repository.name }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
        run: |
          sed -i \
            -e "s|placeholder-worker|${PROJECT_NAME}|g" \
            -e "s|00000000-0000-0000-0000-000000000000|${D1_DATABASE_ID}|g" \
            -e "s|placeholder-db|${D1_DATABASE_NAME}|g" \
            wrangler.jsonc
          echo "── materialized wrangler.jsonc ──"
          cat wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        run: |
          CLOUDFLARE_API_TOKEN='${{ secrets.CLOUDFLARE_API_TOKEN }}' \
          CLOUDFLARE_ACCOUNT_ID='${{ secrets.CLOUDFLARE_ACCOUNT_ID }}' \
          bunx wrangler deploy
